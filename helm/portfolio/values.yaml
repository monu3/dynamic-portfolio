replicaCount: 2
backend:
  image:
    repository: portfolio-backend
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 8080
  servicePort: 8081
frontend:
  image:
    repository: portfolio-frontend
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 80
  servicePort: 8082
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
  # Change 'portfolio.local' to:
  # - Your domain: 'portfolio.example.com'
  # - Server IP: '192.168.1.100.nip.io' (auto-resolves to IP)
  # - Hostname: 'portfolio.yourdomain.com'
  hosts:
    - host: portfolio.local
      paths:
        - path: /api
          pathType: Prefix
          serviceName: portfolio-backend
          servicePort: 8081
        - path: /
          pathType: Prefix
          serviceName: portfolio-frontend
          servicePort: 8082
  tls: []
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
