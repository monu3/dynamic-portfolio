apiVersion: v1
kind: Service
metadata:
  name: {{ template "portfolio.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ template "portfolio.name" . }}-frontend
  ports:
    - protocol: TCP
      port: {{ .Values.frontend.servicePort }}
      targetPort: {{ .Values.frontend.containerPort }}
  type: ClusterIP
