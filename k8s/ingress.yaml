# =====================================================
# INGRESS
# =====================================================
# Routes external HTTP/HTTPS traffic from outside the cluster
# to the appropriate internal services based on URL paths
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress # Name of the ingress resource
  namespace: portfolio # Ingress in portfolio namespace
  annotations:
    # Specify which ingress controller should handle this ingress
    kubernetes.io/ingress.class: nginx # Use NGINX ingress controller
spec:
  # Rules for routing traffic
  rules:
    # Default host (matches all hostnames or empty host)
    - host: ""
      http:
        paths:
          # Route API requests to backend service
          - path: /api # Match URLs starting with /api
            pathType: Prefix # Prefix matching (not exact)
            backend:
              service:
                name: portfolio-backend # Route to backend service
                port:
                  number: 8081 # On backend service port 8081

          # Route root and other paths to frontend
          - path: / # Match all remaining paths
            pathType: Prefix # Prefix matching
            backend:
              service:
                name: portfolio-frontend # Route to frontend service
                port:
                  number: 8082 # On frontend service port 8082
