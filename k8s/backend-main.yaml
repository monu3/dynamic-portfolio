# =====================================================
# BACKEND DEPLOYMENT
# =====================================================
# Defines how the backend Spring Boot application should be deployed
# and managed by Kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend # Name of the deployment
  namespace: portfolio # Deploy in portfolio namespace
  labels:
    app: portfolio-backend # Label for organization and selection
spec:
  # Number of pod replicas to create initially
  replicas: 1

  # Strategy for updating pods to new versions
  strategy:
    type: RollingUpdate # Gradually replace old pods with new ones
    rollingUpdate:
      maxUnavailable: 25% # Keep 75% of pods available during update
      maxSurge: 50% # Allow 150% total pods during update

  # Label selector to identify pods managed by this deployment
  selector:
    matchLabels:
      app: portfolio-backend # Select pods with this label

  # Template for creating new pod replicas
  template:
    metadata:
      labels:
        app: portfolio-backend # Label each pod for service discovery
    spec:
      containers:
        - name: portfolio-backend # Container name within the pod
          image: monusiddiki/portfolio-backend:latest # Docker image to use
          imagePullPolicy: IfNotPresent # Don't pull if image exists locally
          ports:
            - containerPort: 8080 # Port the application listens on inside container

          # Load configuration from ConfigMap as environment variables
          envFrom:
            - configMapRef:
                name: db-config # Reference to database config ConfigMap

          # Resource requests and limits for cluster scheduling
          resources:
            # Minimum resources required to schedule this pod
            requests:
              cpu: "200m" # 200 millicores (0.2 CPU)
              memory: "256Mi" # 256 Megabytes of RAM
            # Maximum resources the container can use
            limits:
              cpu: "500m" # 500 millicores (0.5 CPU)
              memory: "512Mi" # 512 Megabytes of RAM

---
# =====================================================
# BACKEND SERVICE
# =====================================================
# Creates an internal DNS entry and load balancer for the backend
# Other pods can access it via 'portfolio-backend:8081'
apiVersion: v1
kind: Service
metadata:
  name: portfolio-backend # Service name (used as DNS hostname)
  namespace: portfolio # Service in portfolio namespace
spec:
  # Select pods to expose
  selector:
    app: portfolio-backend # Route traffic to backend pods

  # Port mapping configuration
  ports:
    - protocol: TCP # Communication protocol
      port: 8081 # Internal service port (accessed by other pods)
      targetPort: 8080 # Container port to forward traffic to

  # Service type
  type: ClusterIP # Internal-only service (not accessible from outside cluster)